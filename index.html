<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple iiii Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Simple Website</h1>
    <p>Click the button to see some JavaScript in action.</p>

    <button onclick="showMessage()">Click Me</button>

    <div id="message"></div>

    <script>
        function showMessage() {
            const msgBox = document.getElementById("message");
            msgBox.textContent = "Hello! JavaScript is working.";
        }
    </script>

</body>
</html>
